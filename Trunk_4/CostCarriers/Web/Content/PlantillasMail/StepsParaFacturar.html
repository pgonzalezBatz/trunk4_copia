<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<!-- Los estilos llevan doble llave porque al realizar un string.format daba error -->
<head>
    <title></title>
    <style type="text/css">
        body
        {{
            font-family: Verdana,Arial,Times New Roman;
            font-size: 12px;
        }}
        p
        {{
            margin-bottom: 10px;
        }}
        .tabla-formulario 
        {{
            border: 1px solid #A8A8A8;
            padding: 0;
            margin: 0;
        }}
        .tabla-formulario td 
        {{
            padding: 5px 5px 5px 5px;
            vertical-align: top;
        }}
        .tabla-formulario th.cabecera {{
            font-weight: bold;
            background-color: #CCCCCC;
            padding: 5px 5px 5px 5px;
            text-transform: uppercase;
            font-size: 13px;
            text-align: center;
        }}
    </style>
</head>
<body>
    <p>New steps made by the <b>Cost carrier</b> application need to be invoiced.</p>
    <br />
    <table class="tabla-formulario">
        <thead>
            <tr>
                <th class="cabecera"><b>Plant</b></th>
                <th class="cabecera"><b>Cost group</b></th>
                <th class="cabecera"><b>Carrier</b></th>
                <th class="cabecera"><b>Positions</b></th>
                <th class="cabecera" style="text-align: right;"><b>Percentage</b></th>
                <th class="cabecera" style="text-align: right;"><b>Amount</b></th>
                <th class="cabecera" style="text-align: right;"><b>Order</b></th>
            </tr>
        </thead>
        <tbody>
            {1}
        </tbody>
    </table>
    <p><b>Additional instructions:</b></p>
    <p>{2}</p>
    <br />
    <p><b>Sent by:</b></p>
    <p>{3}</p>
    <br />
    <p>Click on this link to proceed with the invoicing <a href="{0}">link</a></p>
    <br />
    <p>Thanks</p>
</body>
</html>
